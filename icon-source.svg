<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="t-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f36"/><stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <linearGradient id="g-calc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd23a"/><stop offset="1" stop-color="#f2b011"/>
    </linearGradient>
  </defs>

  <!-- full-bleed dark ground (OS applies its own mask/rounding) -->
  <rect width="512" height="512" fill="url(#t-dark)"/>

  <!-- mascot, scaled into the maskable safe zone -->
  <g transform="translate(256 256) scale(0.86) translate(-256 -256)">
    <!-- ground shadow -->
    <ellipse cx="252" cy="410" rx="150" ry="16" fill="#000" opacity=".22"/>

    <!-- calculator (yellow) -->
    <rect x="270" y="250" width="120" height="156" rx="15" fill="url(#g-calc)" stroke="#b07d0c" stroke-width="4"/>
    <rect x="284" y="264" width="92" height="30" rx="5" fill="#0e1512"/>
    <rect x="322" y="272" width="46" height="6" rx="3" fill="#41d98a" opacity=".9"/>
    <g fill="#26120a">
      <rect x="286" y="306" width="24" height="20" rx="4"/><rect x="318" y="306" width="24" height="20" rx="4"/><rect x="350" y="306" width="24" height="20" rx="4"/>
      <rect x="286" y="334" width="24" height="20" rx="4"/><rect x="318" y="334" width="24" height="20" rx="4"/><rect x="350" y="334" width="24" height="20" rx="4"/>
      <rect x="286" y="362" width="24" height="20" rx="4"/><rect x="318" y="362" width="24" height="20" rx="4"/>
    </g>
    <rect x="350" y="362" width="24" height="20" rx="4" fill="#c02a1c"/>

    <!-- figure (cream, fine lines) -->
    <g fill="none" stroke="#f2ede0" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M196 196 L214 300"/>
      <path d="M214 300 L206 356 L232 396"/>
      <path d="M214 300 L222 356 L196 396"/>
      <path d="M232 396 L250 396"/>
      <path d="M196 396 L178 396"/>
      <path d="M200 214 L170 252 L200 288"/>
      <path d="M206 214 L246 250 L330 250"/>
    </g>
    <circle cx="196" cy="152" r="33" fill="none" stroke="#f2ede0" stroke-width="9"/>
    <g fill="#f2ede0"><circle cx="188" cy="150" r="3"/><circle cx="204" cy="150" r="3"/></g>
    <path d="M184 162 q12 10 24 0" fill="none" stroke="#f2ede0" stroke-width="4" stroke-linecap="round"/>

    <!-- hard hat (orange) -->
    <path d="M150 124 a46 46 0 0 1 92 0 z" fill="#f5901f"/>
    <ellipse cx="196" cy="124" rx="56" ry="12" fill="#dc7413"/>
    <path d="M196 78 V124" stroke="#a85510" stroke-width="10" stroke-linecap="round"/>
    <path d="M172 86 V122 M220 86 V122" stroke="#a85510" stroke-width="6" opacity=".6" stroke-linecap="round"/>
  </g>
</svg>
