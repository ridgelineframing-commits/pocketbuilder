<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1d21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PocketBuilder">
<title>PocketBuilder</title>
<meta name="description" content="PocketBuilder - builder tape calculator: feet-inch fractions, area, volume, roof and stair solver, board feet.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root{
    --bg1:#3b3f47; --bg2:#191b1f;
    --shell:repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,rgba(0,0,0,.05) 1px 3px), linear-gradient(180deg,#3a3f47,#20242a);
    --edge:#0c0d10;
    --chrome:#22262b; --line:#3a3f47;
    --key:#3a4047; --keyfn:#545b64; --keytxt:#eef0f2; --keysub:#aeb4bd;
    --accent:#b2241a; --accent2:#d65a4c;
    --opk1:#7d858f; --opk2:#59616b; --optxt:#ffffff;
    --paper:#ffffff; --paperline:#e1e1e1; --papermargin:#f0c4bd; --papertxt:#1d1f22; --papermut:#a6a09a;
    --kh:clamp(26px,4.7vh,44px); --kfs:clamp(12px,3.3vw,17px); --kfs-s:clamp(9px,2.3vw,12px);
    --kfs-op:clamp(15px,4vw,21px); --kfs-eq:clamp(16px,4.4vw,23px); --gap:clamp(3px,1vw,6px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;width:100%;overflow:hidden;background:radial-gradient(1100px 760px at 50% -8%,var(--bg1),var(--bg2)) fixed;color:var(--keytxt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overscroll-behavior:none;
    display:flex;align-items:center;justify-content:center;}

  #device{position:relative;flex:0 0 auto;width:min(100vw,432px);height:100dvh;max-height:940px;margin:auto;display:flex;flex-direction:column;min-width:0;
    background:var(--shell);background-position:center;
    border:1px solid var(--edge);border-radius:30px;padding:20px 16px 24px;
    box-shadow:0 34px 80px rgba(0,0,0,.62), 0 8px 18px rgba(0,0,0,.45),
      inset 0 3px 1px rgba(255,255,255,.22), inset 0 -6px 16px rgba(0,0,0,.6), inset 0 0 0 1px rgba(0,0,0,.28);}
  .screw{position:absolute;width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#dfe3e8,#34373c);box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.7);}
  .screw.s1{top:9px;left:9px;}.screw.s2{top:9px;right:9px;}.screw.s3{bottom:9px;left:9px;}.screw.s4{bottom:9px;right:9px;}

  #app{position:relative;display:flex;flex-direction:column;flex:1;min-height:0;min-width:0;width:100%;border-radius:12px;overflow:hidden;background:var(--chrome);
    box-shadow:inset 0 0 0 2px var(--edge), inset 0 5px 12px rgba(0,0,0,.65), 0 0 0 3px rgba(0,0,0,.32), 0 2px 1px rgba(255,255,255,.12);}

  header{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--chrome);border-bottom:1px solid var(--line);min-width:0;}
  .namebtn{background:none;border:none;color:var(--keytxt);font-family:Georgia,"Times New Roman",serif;font-weight:800;font-size:16px;letter-spacing:.4px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:2px 2px;white-space:nowrap;}
  .namebtn .caret{font-size:10px;color:var(--keysub);}
  header .sp{flex:1;}
  .memchip{font-size:11px;font-weight:700;color:var(--keysub);background:color-mix(in srgb,var(--keysub) 12%,transparent);border:1px solid color-mix(in srgb,var(--keysub) 34%,transparent);border-radius:7px;padding:3px 8px;display:none;}
  .hbtn{background:var(--keyfn);border:1px solid var(--line);color:var(--keytxt);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;}
  .hbtn:active{filter:brightness(1.2);}

  .taparea{position:relative;flex:1;min-height:0;min-width:0;display:flex;flex-direction:column;}
  .tapewrap{flex:1;min-height:0;min-width:0;overflow-y:scroll;overflow-x:hidden;scrollbar-gutter:stable;padding:0;background-color:var(--paper);-webkit-overflow-scrolling:touch;
    background-image:linear-gradient(90deg,transparent 0 40px,var(--papermargin) 40px 42px,transparent 42px),
      repeating-linear-gradient(to bottom,transparent 0,transparent 31px,var(--paperline) 31px,var(--paperline) 32px);
    background-attachment:local;}
  .tline{display:grid;grid-template-columns:20px minmax(0,1fr) minmax(0,auto);gap:6px;align-items:flex-end;min-height:32px;padding:3px 12px 5px 50px;cursor:pointer;font-variant-numeric:tabular-nums;width:100%;max-width:100%;}
  .tline.sel{background:color-mix(in srgb,var(--papertxt) 10%,transparent);}
  .tline .op{color:var(--papertxt);font-weight:700;text-align:right;font-size:14px;line-height:1;min-width:0;}
  .tline .val{font-size:18px;font-weight:600;color:var(--papertxt);line-height:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .tline .note{font-size:13.5px;color:var(--papermut);font-style:italic;text-align:right;min-width:0;max-width:62%;white-space:normal;overflow-wrap:anywhere;line-height:1.25;}
  .tline.active{min-height:34px;} .tline.active .val{font-weight:700;font-size:19px;color:var(--papertxt);}
  .tline.active .op{color:var(--papertxt);}
  .tline.carry .op{color:var(--papermut);font-size:13px;}
  .tline.caret .val::after{content:"";display:inline-block;width:2px;height:18px;background:var(--papertxt);margin-left:2px;vertical-align:-3px;animation:bl 1s steps(1) infinite;}
  @keyframes bl{50%{opacity:0;}}
  .tline.sep{min-height:32px;} .tline.info{grid-template-columns:20px minmax(0,1fr);} .tline.info .val{font-size:13px;font-weight:500;color:var(--papermut);font-style:italic;white-space:normal;overflow-wrap:anywhere;}
  .tline.subtotal{cursor:pointer;}
  .tline.subtotal .val{font-weight:800;color:var(--papertxt);font-size:15px;font-style:normal;white-space:nowrap;font-variant-numeric:tabular-nums;border-top:1px solid var(--papermut);padding-top:3px;}
  .emptytape{padding:0 14px 0 50px;color:var(--papermut);font-size:13px;line-height:32px;}

  .grandbar{background:var(--chrome);display:flex;align-items:center;gap:10px;padding:5px 12px;border-top:1px solid var(--line);min-width:0;}
  .grandbar .lab{font-size:10px;color:var(--keysub);text-transform:uppercase;letter-spacing:.8px;font-weight:700;flex:0 0 auto;}
  .grandbar .gt{flex:1;min-width:0;text-align:right;font-size:21px;font-weight:800;color:var(--keytxt);font-variant-numeric:tabular-nums;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .grandbar .gd{font-size:10px;color:var(--keysub);min-width:48px;flex:0 0 auto;text-align:right;}

  .toppanel{position:absolute;inset:0;z-index:6;display:none;overflow-y:auto;background:var(--paper);padding:9px 11px;} .toppanel.on{display:block;}
  .tphdr{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--papertxt);text-transform:uppercase;margin-bottom:6px;}
  .tphint{flex:1;font-size:9px;font-weight:600;color:var(--papermut);text-transform:none;}
  .tpx{cursor:pointer;color:var(--papermut);font-weight:700;font-size:13px;padding:0 4px;}
  .tpbtns{display:flex;justify-content:flex-end;margin-top:8px;} .tpbtns .btn{padding:8px 16px;}
  #roofcells,#staircells{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .cc{position:relative;background:#fff;border:1px solid #ddd2cd;border-radius:7px;padding:4px 7px;display:flex;flex-direction:column;min-width:0;}
  .cc span{font-size:8px;color:#9b958c;text-transform:uppercase;letter-spacing:.5px;} .cc b{font-size:13px;color:#1f2126;font-variant-numeric:tabular-nums;}
  .cc.ed{cursor:pointer;} .cc.ed::after{content:"\270E";position:absolute;top:3px;right:5px;font-size:8px;color:#b6b0a6;}
  .lblrow{grid-column:1/-1;font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--papermut);text-transform:uppercase;padding:5px 2px 1px;border-top:1px dashed var(--papermut);margin-top:2px;}

  .pad,.padred,.padmin{background:var(--chrome);padding:var(--gap) var(--gap) calc(var(--gap) + 1px);gap:var(--gap);border-top:1px solid var(--line);}
  .pad{display:grid;grid-template-columns:repeat(5,1fr);}
  .padred,.padmin{display:none;grid-template-columns:repeat(4,1fr);}
  #keys.reduced .pad{display:none;} #keys.reduced .padred{display:grid;}
  #keys.minimal .pad{display:none;} #keys.minimal .padmin{display:grid;}
  .key{border:1px solid #00000040;border-radius:9px;height:var(--kh);font-size:var(--kfs);font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05;color:var(--keytxt);
    background:linear-gradient(180deg,color-mix(in srgb,var(--key) 90%,#fff 10%),var(--key));box-shadow:0 1px 1px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.10);}
  .key:active,.key.hit{filter:brightness(.9);}
  .key.fn,.key.roof,.key.mem{color:var(--keytxt);font-size:var(--kfs-s);
    background:linear-gradient(180deg,color-mix(in srgb,var(--keyfn) 90%,#fff 10%),var(--keyfn));}
  .key.op{color:var(--optxt);font-size:var(--kfs-op);background:linear-gradient(180deg,var(--opk1),var(--opk2));}
  .key.eq{background:linear-gradient(180deg,var(--opk1),var(--opk2));color:#fff;font-size:var(--kfs-eq);border-color:#454c55;}
  .key.ac{color:#fff;background:linear-gradient(180deg,#b6453b,#8d2a22);}
  .key small{display:block;font-size:clamp(7px,1.8vw,9px);color:var(--keysub);font-weight:600;margin-top:1px;}
  /* bigger keys for the 4-column minimal pad */
  .padmin .key{height:clamp(42px,7.4vh,72px);font-size:clamp(17px,5vw,26px);}
  .padmin .key.fn{font-size:clamp(12px,3.4vw,17px);}
  .padmin .key.op,.padmin .key.eq{font-size:clamp(20px,5.6vw,30px);}
  .padred .key{height:clamp(30px,5.4vh,52px);}

  .chin{text-align:center;font-size:8px;letter-spacing:2.5px;color:rgba(255,255,255,.72);font-weight:700;padding:9px 0 1px;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.6);}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:50;} .scrim.on{display:flex;}
  .sheet{background:#22262b;width:100%;max-width:432px;border-radius:18px 18px 0 0;padding:16px;border-top:3px solid var(--accent);box-shadow:0 -6px 24px rgba(0,0,0,.4);max-height:88vh;overflow-y:auto;}
  .sheet h4{margin:0 0 12px;font-size:16px;color:var(--keytxt);}
  .mrow{margin-bottom:14px;} .mrow .ml{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--keysub);font-weight:700;margin-bottom:6px;}
  .seg{display:flex;gap:6px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:62px;background:var(--keyfn);border:1px solid var(--line);color:var(--keytxt);border-radius:9px;padding:9px 6px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .swatch{width:34px;height:34px;border-radius:8px;border:2px solid #3a3f47;cursor:pointer;flex:0 0 auto;}
  .swatch.on{border-color:var(--accent2);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent2) 35%,transparent);}
  .menubtns{display:flex;gap:10px;margin-top:6px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 15px;font-size:14px;font-weight:700;cursor:pointer;flex:1;}
  .btn.alt{background:var(--keyfn);border:1px solid var(--line);color:var(--keytxt);}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#1f2226;color:#eef0f2;border:1px solid var(--accent);padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;z-index:60;pointer-events:none;max-width:90%;text-align:center;} .toast.on{opacity:1;}
  .notebar{display:none;align-items:center;gap:8px;padding:6px 10px;background:var(--chrome);border-top:1px solid var(--line);min-width:0;}
  .notebar.on{display:flex;}
  .notebar .nlab{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--keysub);flex:0 0 auto;}
  .notebar input{flex:1;min-width:0;font-size:16px;background:var(--paper);color:var(--papertxt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;-webkit-user-select:text;user-select:text;}
  .notebar .nbtn{flex:0 0 auto;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div id="device">
  <span class="screw s1"></span><span class="screw s2"></span><span class="screw s3"></span><span class="screw s4"></span>
  <div id="app">
    <header>
      <button class="namebtn" id="nameBtn">PocketBuilder <span class="caret">&#9662;</span></button>
      <div class="sp"></div>
      <span class="memchip" id="mem"></span>
      <button class="hbtn" id="kbBtn">abc</button>
    </header>
    <div class="taparea">
      <div class="tapewrap" id="tape"></div>
      <div class="toppanel" id="roofpop">
        <div class="tphdr">ROOF<span class="tphint">type a value, then tap a field</span><span class="tpx" id="roofPopClose">&#10005;</span></div>
        <div id="roofcells"></div>
        <div class="tpbtns"><button class="btn" id="roofToTape">&rarr; Tape</button></div>
      </div>
      <div class="toppanel" id="stairpop">
        <div class="tphdr">STAIRS<span class="tphint">type a value, then tap a field</span><span class="tpx" id="stairPopClose">&#10005;</span></div>
        <div id="staircells"></div>
        <div class="tpbtns"><button class="btn" id="stairToTape">&rarr; Tape</button></div>
      </div>
    </div>
    <div class="grandbar"><span class="lab">Total</span><span class="gt" id="grand">0</span><span class="gd" id="gdim"></span></div>
    <div class="notebar" id="noteBar"><span class="nlab">Note</span><input id="noteInput" type="text" placeholder="label this line&#8230;" autocomplete="off" autocorrect="off" autocapitalize="sentences"><button class="nbtn" id="noteDone">Done</button></div>
    <div id="keys">
      <div class="pad" id="pad">
        <button class="key roof" data-k="pitch">Pitch</button><button class="key roof" data-k="rise">Rise</button><button class="key roof" data-k="run">Run</button><button class="key roof" data-k="diag">Diag</button><button class="key roof" data-k="hipv">Hip/V</button>
        <button class="key fn" data-k="bdft">Bd Ft</button><button class="key fn" data-k="stair">Stair</button><button class="key fn" data-k="circ">Circ</button><button class="key fn" data-k="conv">Conv</button><button class="key fn" data-k="sqrt">&#8730;x</button>
        <button class="key fn" id="u0" data-k="yd">Yds</button><button class="key fn" id="u1" data-k="feet">Feet</button><button class="key fn" id="u2" data-k="inch">Inch</button><button class="key fn" id="fracKey" data-k="frac">/<small>frac</small></button><button class="key fn" data-k="bk">&#9003;</button>
        <button class="key mem" data-k="rcl">Rcl</button><button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="div">&divide;</button>
        <button class="key mem" data-k="mplus">M+</button><button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="mul">&times;</button>
        <button class="key mem" data-k="mminus">M&minus;</button><button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key op" data-k="sub">&minus;</button>
        <button class="key ac" data-k="ac">AC</button><button class="key" data-k="0">0</button><button class="key" data-k="dot">.</button><button class="key" data-k="pm">&plusmn;</button><button class="key op" data-k="add">+</button>
        <button class="key fn" data-k="pct">%</button><button class="key eq" style="grid-column:span 4" data-k="eq">= <small>sum / space</small></button>
      </div>
      <div class="padred" id="padred">
        <button class="key roof" data-k="pitch">Pitch</button><button class="key roof" data-k="rise">Rise</button><button class="key roof" data-k="run">Run</button><button class="key roof" data-k="diag">Diag</button>
        <button class="key fn" data-k="stair">Stair</button><button class="key fn" data-k="circ">Circ</button><button class="key fn" data-k="conv">Conv</button><button class="key fn" data-k="bk">&#9003;</button>
        <button class="key fn" data-k="feet">Feet</button><button class="key fn" data-k="inch">Inch</button><button class="key fn" data-k="frac">/<small>frac</small></button><button class="key op" data-k="div">&divide;</button>
        <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="mul">&times;</button>
        <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="sub">&minus;</button>
        <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key op" data-k="add">+</button>
        <button class="key ac" data-k="ac">AC</button><button class="key" data-k="0">0</button><button class="key" data-k="pm">&plusmn;</button><button class="key" data-k="dot">.</button>
        <button class="key eq" style="grid-column:span 4" data-k="eq">= <small>sum / space</small></button>
      </div>
      <div class="padmin" id="padmin">
        <button class="key ac" data-k="ac">AC</button><button class="key fn" data-k="bk">&#9003;</button><button class="key fn" data-k="frac">/<small>frac</small></button><button class="key op" data-k="div">&divide;</button>
        <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="mul">&times;</button>
        <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="sub">&minus;</button>
        <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key op" data-k="add">+</button>
        <button class="key fn" data-k="feet">Feet</button><button class="key fn" data-k="inch">Inch</button><button class="key" data-k="pm">&plusmn;</button><button class="key" data-k="dot">.</button>
        <button class="key" style="grid-column:span 2" data-k="0">0</button><button class="key eq" style="grid-column:span 2" data-k="eq">=</button>
      </div>
    </div>
  </div>
  <div class="chin">Ridgeline Construction &bull; ft-in / metric</div>
</div>

<div class="scrim" id="menu"><div class="sheet">
  <h4>PocketBuilder</h4>
  <div class="mrow"><div class="ml">Units</div><div class="seg" id="unitSeg"><button data-u="imp">Imperial</button><button data-u="met">Metric</button></div></div>
  <div class="mrow"><div class="ml">Fraction precision</div><div class="seg" id="fracSeg"><button data-fr="8">1/8</button><button data-fr="16">1/16</button><button data-fr="32">1/32</button></div></div>
  <div class="mrow"><div class="ml">Keypad</div><div class="seg" id="layoutSeg"><button data-ly="full">Full</button><button data-ly="reduced">Reduced</button><button data-ly="minimal">Minimal</button></div></div>
  <div class="mrow"><div class="ml">Case</div><div class="seg" id="styleSeg">
    <button data-st="graphite">Graphite</button><button data-st="steel">Steel</button><button data-st="navy">Navy</button><button data-st="forest">Forest</button><button data-st="sand">Sand</button><button data-st="crimson">Crimson</button>
    <button data-st="wood">Carpenter</button><button data-st="concrete">Concrete</button><button data-st="circuit">Electric</button><button data-st="water">Plumber</button>
  </div></div>
  <div class="mrow"><div class="ml">Paper tape</div><div class="seg" id="paperSeg" style="gap:10px">
    <span class="swatch" data-pa="white" style="background:#ffffff"></span>
    <span class="swatch" data-pa="manila" style="background:#ecdcba"></span>
    <span class="swatch" data-pa="sky" style="background:#e3edfb"></span>
    <span class="swatch" data-pa="charcoal" style="background:#2b2e33"></span>
    <span class="swatch" data-pa="navy" style="background:#19233b"></span>
    <span class="swatch" data-pa="forest" style="background:#1b2a1d"></span>
  </div></div>
  <div class="menubtns">
    <button class="btn alt" id="mNew">New tape</button>
    <button class="btn" id="mSave">Save .txt</button>
    <button class="btn alt" id="menuClose">Done</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<script>


/* BuilderTape engine v5 — roof solver + tape blocks + repeat-equals + unit-basis display */
(function(global){

/* ---------- roof / stair solver ---------- */
function makeRoofD(){ return {pitch:null,run:null,rise:null,diag:null,hip:null,angle:null,given:[]}; }
function makeStairD(){ return {rise:null,target:7.75,tread:10,n:null,riser:null,treads:null,run:null,stringer:null,landRiser:null,surface:0.75,landFinish:null,landFrame:null}; }
var roofD=makeRoofD(), stairD=makeStairD();
function roofSetField(d,key,val){ if(key==="pitch") d.pitch=val; else d[key]=val; d.given=d.given.filter(function(k){return k!==key;}); d.given.push(key); if(d.given.length>2) d.given.shift(); solveRoof(d); }
function solveRoof(d){
  var g=d.given; if(g.length<2) return;
  var kv={}; kv[g[0]]=d[g[0]]; kv[g[1]]=d[g[1]];
  var rise=('rise'in kv)?kv.rise:null, run=('run'in kv)?kv.run:null, diag=('diag'in kv)?kv.diag:null, pitch=('pitch'in kv)?kv.pitch:null;
  if(rise!=null&&run!=null){}
  else if(rise!=null&&diag!=null){ if(diag<rise)return; run=Math.sqrt(diag*diag-rise*rise); }
  else if(run!=null&&diag!=null){ if(diag<run)return; rise=Math.sqrt(diag*diag-run*run); }
  else if(rise!=null&&pitch!=null){ run=pitch!==0?rise*12/pitch:0; }
  else if(run!=null&&pitch!=null){ rise=run*pitch/12; }
  else if(diag!=null&&pitch!=null){ var th=Math.atan2(pitch,12); rise=diag*Math.sin(th); run=diag*Math.cos(th); }
  if(rise==null||run==null) return;
  d.rise=rise; d.run=run; d.diag=Math.sqrt(rise*rise+run*run); d.pitch=run!==0?rise/run*12:0;
  d.hip=Math.sqrt((run*Math.SQRT2)*(run*Math.SQRT2)+rise*rise); d.angle=Math.atan2(rise,run)*180/Math.PI;
}
function stairSetField(d,key,val){ d[key]=val; solveStair(d); }
function solveStair(d){
  if(d.rise==null||d.rise<=0){ d.n=d.riser=d.treads=d.run=d.stringer=d.landFinish=d.landFrame=null; return; }
  var mx=(d.target==null?7.75:d.target), td=(d.tread==null?10:d.tread);
  d.n=Math.max(1,Math.ceil(d.rise/mx)); d.riser=d.rise/d.n; d.treads=d.n-1; d.run=d.treads*td; d.stringer=Math.sqrt(d.rise*d.rise+d.run*d.run);
  if(d.landRiser!=null && d.landRiser>0 && d.riser!=null){ d.landFinish=d.landRiser*d.riser; d.landFrame=d.landFinish-(d.surface==null?0.75:d.surface); }
  else { d.landFinish=null; d.landFrame=null; }
}
function asInches(cur){ if(cur.dim!==BT.SCALAR) return cur.n; return SYS==="met" ? cur.n*39.37007874015748 : cur.n*12; }
function pcell(kind,field,label,val,editable){ return '<div class="cc'+(editable?' ed':'')+'"'+(editable?' data-kind="'+kind+'" data-f="'+field+'"':'')+'><span>'+label+'</span><b>'+val+'</b></div>'; }
function renderRoofPop(){ var d=roofD; el("roofcells").innerHTML=
  pcell("roof","pitch","Pitch", d.pitch!=null?BT.fmtNum(d.pitch,2)+"/12":"—", true)+pcell("roof",null,"Angle", d.angle!=null?BT.fmtNum(d.angle,1)+"°":"—", false)+
  pcell("roof","run","Run", fvL(d.run), true)+pcell("roof","rise","Rise", fvL(d.rise), true)+pcell("roof","diag","Diag", fvL(d.diag), true)+pcell("roof",null,"Hip/V", fvL(d.hip), false); }
function renderStairPop(){ var d=stairD; el("staircells").innerHTML=
  pcell("stair","rise","Total rise", fvL(d.rise), true)+pcell("stair","target","Max riser", fvIn(d.target), true)+pcell("stair","tread","Tread depth", fvIn(d.tread), true)+
  pcell("stair",null,"Risers", d.n!=null?d.n:"—", false)+pcell("stair",null,"Riser height", fvL(d.riser), false)+pcell("stair",null,"Treads", d.treads!=null?d.treads:"—", false)+
  pcell("stair",null,"Total run", fvL(d.run), false)+pcell("stair",null,"Stringer", fvL(d.stringer), false)+
  '<div class="lblrow">Landing</div>'+
  pcell("stair","landRiser","At riser #", d.landRiser!=null?d.landRiser:"—", true)+pcell("stair","surface","Surface thick", fvIn(d.surface), true)+
  pcell("stair",null,"Finish height", fvL(d.landFinish), false)+pcell("stair",null,"Frame height", fvL(d.landFrame), false); }
function openRoofPop(){ renderRoofPop(); el("roofpop").classList.add("on"); }
function openStairPop(){ renderStairPop(); el("stairpop").classList.add("on"); }
function fillField(kind,field){
  if(!c.hasInput()){ toast("Type a value, then tap a field"); return; }
  var cur=c.current(), d=(kind==="roof")?roofD:stairD;
  if(kind==="roof"){ if(field==="pitch") roofSetField(d,"pitch",cur.n); else roofSetField(d,field,asInches(cur)); renderRoofPop(); }
  else {
    if(field==="rise") stairSetField(d,"rise",asInches(cur));
    else if(field==="target"||field==="tread"||field==="surface") stairSetField(d,field,(cur.dim===BT.SCALAR&&SYS==="met")?cur.n/25.4:cur.n);
    else if(field==="landRiser") stairSetField(d,"landRiser",Math.max(0,Math.round(cur.n)));
    renderStairPop();
  }
  c.clearEntry(); render();
}
function answerVal(){ if(c.hasInput()) return c.current(); var a=c.result().acc; return (a && a.n!==0) ? a : null; }
function popCellsClick(e){ var cc=e.target.closest(".cc.ed"); if(!cc) return; fillField(cc.dataset.kind, cc.dataset.f); }
el("roofcells").addEventListener("click",popCellsClick);
el("staircells").addEventListener("click",popCellsClick);

/* ---------- entry / active line display ---------- */
function entryMain(){
  var e=c.e;
  if(e.loaded && e.buf==="" && !e.hasUnit && e.num==null) return fv(e.loaded);
  if(e.hasUnit || e.num!=null){
    var s=fv({n:e.inches,dim:BT.LINEAR,u:(e.basis|| (e.num!=null?"in":null))});
    if(e.num!=null) s += " "+e.num+"/"+(e.buf||"_");
    else if(e.buf!=="") s += " +"+e.buf;
    return s;
  }
  return e.buf===""?"":e.buf;
}
function activeMain(){
  if(c.hasInput()) return entryMain();
  if(c.justEval) return fv(c.result().acc);
  return "";
}
function esc(s){return (s+"").replace(/[&<>]/g,function(ch){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[ch];});}

function render(){
  var fr=c.result(), html="", idx=0;
  for(var k=0;k<c.steps.length;k++){
    var s=c.steps[k];
    if(s.sep){ html+='<div class="tline sep" data-i="'+k+'"></div>'; continue; }
    if(s.info){
      if(s.sub){ html+='<div class="tline subtotal" data-i="'+k+'"><div class="op"></div><div class="val">'+esc((s.text||"").replace(/^= /,""))+'</div><div class="note"></div><span class="cpy" title="Copy value">\u29c9</span></div>'; continue; }
      if(s.vtext){ html+='<div class="tline calcnote'+(editTarget===k?' sel':'')+'" data-i="'+k+'"><div class="op"></div><div class="val">'+esc(s.vtext)+'</div><div class="note">'+esc(s.text||"")+'</div><span class="cpy" title="Copy value">\u29c9</span></div>'; continue; }
      html+='<div class="tline prose'+(editTarget===k?' sel':'')+'" data-i="'+k+'"><div class="op"></div><div class="txt">'+esc(s.text)+'</div></div>'; continue;
    }
    idx++;
    var opSym = s.op==="+"?"+":s.op==="-"?"−":s.op==="*"?"×":"÷";
    var opShown = s.carry ? "↳" : (idx===1?"":opSym);
    var sel = editTarget===k;
    var valHtml = sel ? esc(activeMain()) : esc(fv(s.val));
    html+='<div class="tline'+(sel?' sel active caret':'')+(s.carry?' carry':'')+'" data-i="'+k+'">'+
      '<div class="op">'+opShown+'</div>'+
      '<div class="val">'+valHtml+'</div>'+
      '<div class="note">'+esc(s.note||"")+'</div>'+
      '<span class="cpy" title="Copy value">\u29c9</span></div>';
  }
  if(editTarget==null){
    var am=activeMain();
    if(c.steps.length>0 || am!==""){
      var pend = (!c.justEval && c.pendingOp && c.steps.length>0) ? ({"+":"+","-":"−","*":"×","/":"÷"}[c.pendingOp]) : "";
      html+='<div class="tline active caret">'+
        '<div class="op">'+pend+'</div><div class="val">'+esc(am)+'</div><div class="note">'+esc(window._pendingNote||"")+'</div></div>';
    }
  }
  if(html==="") html='<div class="emptytape">Tape is empty. Type a value, choose an operator, repeat.<br>Tap a line to edit it; tap <b>abc</b> to add a note.</div>';
  var atBottom = (T.tape.scrollHeight - T.tape.scrollTop - T.tape.clientHeight) < 24;
  T.tape.innerHTML=html;
  if(atBottom) T.tape.scrollTop=T.tape.scrollHeight;

  var gt=grandTotal();
  if(fr.error||gt.error){ T.grand.textContent="Error"; T.gdim.textContent=fr.error||gt.error; }
  else if(gt.mixed){ T.grand.textContent=fv(gt.last); T.gdim.textContent="mixed \u2014 last calc"; }
  else { T.grand.textContent=fv(gt.acc); T.gdim.textContent=BT.dimName(gt.acc.dim)||"Number"; }
  T.mem.style.display = c.memory? "inline-block":"none";
  if(c.memory) T.mem.textContent="M "+fv(c.memory);
  save();
}

function addInfo(text){ c.steps.push({info:true,text:text}); }
function toast(m){var t=el("toast");t.textContent=m;t.classList.add("on");clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove("on");},1600);}

function blockValueCount(){ var n=0; for(var i=c.steps.length-1;i>=0;i--){ var s=c.steps[i]; if(s.sep) break; if(!s.info && !s.card && s.val) n++; } return n; }
function grandTotal(){
  var res=null, start=0, err=null;
  for(var i=0;i<=c.steps.length;i++){
    if(i===c.steps.length || c.steps[i].sep){
      var seg=c.steps.slice(start,i); start=i+1;
      var has=false; for(var q=0;q<seg.length;q++){ if(seg[q].val && !seg[q].info){ has=true; break; } }
      if(!has) continue;
      var f=BT.fold(seg);
      if(f.error){ err=f.error; continue; }
      if(!res) res={n:f.acc.n,dim:f.acc.dim,u:f.acc.u};
      else { var r=BT.combine(res,"+",f.acc); if(r.error){ return {mixed:true,last:f.acc,error:err}; } res={n:r.n,dim:r.dim,u:r.u}; }
    }
  }
  return {acc:res||{n:0,dim:0}, error:err};
}
function doEquals(){
  if(c.hasInput()){ c.equals(); }
  var bc=blockValueCount();
  if(bc>=2){ var tot=c.result().acc; c.steps.push({info:true, sub:true, text:"= "+fv(tot)}); }
  if(c.steps.length>0) c.steps.push({sep:true});
  c.pendingOp="+"; c.justEval=false; c.clearEntry(); editTarget=null;
}

/* ---------- inline edit helpers ---------- */
function commitEdit(){
  if(editTarget!=null && c.steps[editTarget] && c.steps[editTarget].val && c.hasInput()){
    c.steps[editTarget].val=c.finalizeEntry();
  }
  c.clearEntry(); editTarget=null; c.justEval=true;
  if(window.recomputeChain) recomputeChain();
}
function deleteLine(i){ c.steps.splice(i,1); editTarget=null; c.clearEntry(); c.justEval=true; if(window.recomputeChain) recomputeChain(); }
function lastNotableLine(){ for(var i=c.steps.length-1;i>=0;i--){ var s=c.steps[i]; if(!s.sep && !s.info && s.val) return i; } return -1; }
function isPristineLoaded(){ var e=c.e; return !!(e.loaded && e.buf==="" && !e.hasUnit && e.num==null); }
function undoLast(){ if(c.steps.length===0) return; c.steps.pop(); while(c.steps.length && (c.steps[c.steps.length-1].sep || c.steps[c.steps.length-1].sub)) c.steps.pop(); editTarget=null; c.clearEntry(); c.justEval=true; if(window.recomputeChain) recomputeChain(); }
function deleteLineUp(){
  var i=editTarget; if(i==null) return;
  c.steps.splice(i,1);
  var j=i-1; while(j>=0 && c.steps[j] && c.steps[j].sep) j--;
  if(j>=0 && c.steps[j]){ editTarget=j; var s=c.steps[j]; if(s.val) c.loadValue(s.val); else c.clearEntry(); }
  else { editTarget=null; c.clearEntry(); c.justEval=true; }
  if(window.recomputeChain) recomputeChain();
}

/* ---------- key handler ---------- */
function isEntryKey(k){ return /^[0-9]$/.test(k) || ["dot","feet","inch","yd","m","cm","mm","frac","pm"].indexOf(k)>=0; }
function applyEntryKey(k){
  if(/^[0-9]$/.test(k)) c.inputDigit(k);
  else if(k==="dot") c.inputDot();
  else if(k==="frac") c.inputFrac();
  else if(k==="pm") c.plusminus();
  else c.inputUnit({feet:"ft",inch:"in",yd:"yd",m:"m",cm:"cm",mm:"mm"}[k]);
}
function press(k){
  if(convMode && ["yd","feet","inch","m","cm","mm"].indexOf(k)>=0){
    var u={feet:"ft",inch:"in",yd:"yd",m:"m",cm:"cm",mm:"mm"}[k];
    var rd=c.convertDisplay(u); convMode=false; c.steps.push({info:true,vtext:rd,text:"converted"}); toast(rd); render(); return;
  }
  if(editTarget!=null){
    if(k==="bk"){
      if(c.hasInput() && !isPristineLoaded()){ c.backspace(); render(); return; }
      deleteLineUp(); render(); return;
    }
    if(isPristineLoaded() && c.e.loaded.dim===BT.LINEAR && (k==="feet"||k==="inch"||k==="yd")){
      c.e.loaded.u = (k==="feet"?"ft":k==="inch"?"in":"yd"); render(); return;
    }
    if(isEntryKey(k)){ applyEntryKey(k); render(); return; }
    if(k!=="ac"){ commitEdit(); }
  } else if(k==="bk" && !c.hasInput()){
    undoLast(); render(); return;
  }
  if(/^[0-9]$/.test(k)){ c.inputDigit(k); render(); return; }
  switch(k){
    case "dot": c.inputDot(); break;
    case "feet": c.inputUnit("ft"); break;
    case "inch": c.inputUnit("in"); break;
    case "yd": c.inputUnit("yd"); break;
    case "m": c.inputUnit("m"); break;
    case "cm": c.inputUnit("cm"); break;
    case "mm": c.inputUnit("mm"); break;
    case "frac": c.inputFrac(); break;
    case "add": c.operator("+"); break;
    case "sub": c.operator("-"); break;
    case "mul": c.operator("*"); break;
    case "div": c.operator("/"); break;
    case "eq": doEquals(); break;
    case "space": doEquals(); break;
    case "pct": c.percent(); break;
    case "sqrt": { var sq=c.sqrt(); toast("\u221a = "+fv(sq)); break; }
    case "pm": c.plusminus(); break;
    case "bk": if(window._pendingNote){ window._pendingNote=window._pendingNote.slice(0,-1); break; } c.backspace(); break;
    case "ac": c.allClear(); convMode=false; window._pendingNote=""; roofD=makeRoofD(); stairD=makeStairD(); editTarget=null;
      el("roofpop").classList.remove("on"); el("stairpop").classList.remove("on"); closeNote(); break;
    case "mplus": c.memPlus(); toast("M+ "+fv(c.memory)); break;
    case "mminus": c.memMinus(); toast("M− "+fv(c.memory)); break;
    case "rcl": c.recall(); break;
    case "conv": convMode=!convMode; toast(convMode?"Convert: tap a unit":"Convert off"); break;
    case "pitch": { var v=answerVal(); if(v){ roofSetField(roofD,"pitch",v.n); c.clearEntry(); } openRoofPop(); break; }
    case "run":   { var v=answerVal(); if(v){ roofSetField(roofD,"run",asInches(v)); c.clearEntry(); } openRoofPop(); break; }
    case "rise":  { var v=answerVal(); if(v){ roofSetField(roofD,"rise",asInches(v)); c.clearEntry(); } openRoofPop(); break; }
    case "diag":  { var v=answerVal(); if(v){ roofSetField(roofD,"diag",asInches(v)); c.clearEntry(); } openRoofPop(); break; }
    case "hipv":  openRoofPop(); break;
    case "stair": { var v=answerVal(); if(v){ stairSetField(stairD,"rise",asInches(v)); c.clearEntry(); } openStairPop(); break; }
    case "circ": { var cc=c.circle(); c.steps.push({info:true,vtext:fv(cc.diam),text:"circle \u2300"}); c.steps.push({info:true,vtext:fv(cc.circ),text:"circumference"}); c.steps.push({info:true,vtext:fv(cc.area),text:"area"}); c.loadValue(cc.area); break; }
    case "bdft": { var b=c.boardFeet(); if(b.error){toast(b.error);} else { c.steps.push({info:true,vtext:BT.fmtNum(b.n),text:"board feet"}); c.loadValue(b); } break; }
  }
  render();
}
el("keys").addEventListener("pointerdown",function(e){
  var b=e.target.closest(".key"); if(!b) return; e.preventDefault();
  if(el("noteBar").classList.contains("on")) closeNote();
  b.classList.add("hit"); setTimeout(function(){b.classList.remove("hit");},90);
  press(b.dataset.k);

/* physical keyboard */
window.addEventListener("keydown",function(e){
  if(document.activeElement===el("noteInput")) return;
  if(el("menu").classList.contains("on")) return;
  var map={"+":"add","-":"sub","*":"mul","/":"div","=":"eq","Enter":"eq",".":"dot","Backspace":"bk","%":"pct","Escape":"ac"};
  if(/^[0-9]$/.test(e.key)){ press(e.key); e.preventDefault(); }
  else if(map[e.key]){ press(map[e.key]); e.preventDefault(); }
  else if(/^[a-zA-Z '\-#]$/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey){
    /* text goes to the note column automatically: numerals left, words right */
    if(c.hasInput() || window._pendingNote){
      if(e.key===" " && !window._pendingNote){ /* space before any text: ignore */ }
      else { window._pendingNote+=e.key; }
      render(); e.preventDefault(); return;
    }
    if(!/^[a-zA-Z]$/.test(e.key)) return;
    var ti = (editTarget!=null && c.steps[editTarget] && c.steps[editTarget].val) ? editTarget : lastNotableLine();
    if(ti>=0 && c.steps[ti] && c.steps[ti].val){
      editTarget=ti; if(!c.hasInput()) c.loadValue(c.steps[ti].val);
      if(openNote()){ var ni=el("noteInput"); ni.value+=e.key; c.steps[ti].note=ni.value; render(); e.preventDefault(); }
    }
  }
});

/* ---------- tape tap: select / edit line ---------- */
T.tape.addEventListener("click",function(e){
  var cp=e.target.closest(".cpy");
  if(cp){
    var crow=cp.closest(".tline"); var ci=parseInt(crow.dataset.i,10); var st=c.steps[ci]; if(!st) return;
    var txt = st.sub ? (st.text||"").replace(/^= /,"") : (st.vtext ? st.vtext : (st.val ? fv(st.val) : ""));
    if(txt){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){toast("Copied "+txt);},function(){toast("Copy failed");}); } else toast("Copy not supported"); }
    return;
  }
  var row=e.target.closest(".tline");
  if(!row || (row.classList.contains("active") && editTarget==null)){ if(editTarget!=null){ commitEdit(); render(); } return; }
  var i=parseInt(row.dataset.i,10); if(isNaN(i)) return;
  if(editTarget!=null && editTarget!==i) commitEdit();
  editTarget=i;
  var s=c.steps[i];
  if(s && s.val) c.loadValue(s.val); else c.clearEntry();
  render();
});

/* ---------- notes (abc keyboard) ---------- */
function openNote(){
  var st = (editTarget!=null) ? c.steps[editTarget] : null;
  if(st && (st.sep || st.sub)){ toast("Pick a value or text line"); return false; }
  if(!st){
    /* nothing selected: start a fresh text line at the end of the tape, like typing in a notepad */
    c.steps.push({info:true,text:""});
    editTarget=c.steps.length-1; st=c.steps[editTarget]; render();
  }
  var ni=el("noteInput");
  ni.value = st.info ? (st.text||"") : (st.note||"");
  el("noteBar").classList.add("on"); ni.focus();
  try{ ni.setSelectionRange(ni.value.length,ni.value.length); }catch(e){}
  return true;
}
function closeNote(){ el("noteBar").classList.remove("on"); var ni=el("noteInput"); if(ni) ni.blur();
  if(editTarget!=null && c.steps[editTarget]){ var st=c.steps[editTarget];
    if(st.info && !st.sub && !st.vtext && !(st.text||"").trim()){ c.steps.splice(editTarget,1); editTarget=null; render(); } } }
el("kbBtn").addEventListener("click",openNote);
el("noteDone").addEventListener("click",closeNote);
el("noteInput").addEventListener("input",function(){
  if(editTarget!=null && c.steps[editTarget]){ var st=c.steps[editTarget];
    if(st.info) st.text=el("noteInput").value; else st.note=el("noteInput").value; render(); }

/* ---------- save .txt ---------- */
function tapeText(){
  var fr=c.result(), out=[], idx=0, W=15;
  function pad(v){ v=String(v==null?"":v); while(v.length<W) v=" "+v; return v; }
  out.push("POCKETBUILDER \u2014 TAPE"); out.push(new Date().toLocaleString()); out.push("");
  for(var k=0;k<c.steps.length;k++){ var s=c.steps[k];
    if(s.sep){ out.push(""); idx=0; continue; }
    if(s.info){
      if(s.sub){ out.push("  "+pad("--------")); out.push("  "+pad((s.text||"").replace(/^= /,""))); continue; }
      if(s.vtext){ out.push("  "+pad(s.vtext)+"   "+(s.text||"")); continue; }
      out.push(s.text||""); continue;
    }
    idx++;
    var op=s.carry?">":s.op==="+"?"+":s.op==="-"?"-":s.op==="*"?"x":"/";
    out.push((idx===1?" ":op)+" "+pad(fv(s.val))+(s.note?"   "+s.note:""));
  }
  out.push(""); out.push("TOTAL: "+(fr.error?("Error \u2014 "+fr.error):fv(fr.acc))+"  "+(BT.dimName(fr.acc.dim)||""));
  return out.join("\n");
}

}

/* ---------- Edit a line's OPERATION on the tape (3+3 -> tap line, press x -> 3x3) ---------- */
(function(){
  var OPMAP={add:"+",sub:"-",mul:"*",div:"/"};
  /* re-derive the whole chain so carried-forward totals + printed subtotals stay correct */
  function recomputeChain(){
    var prev=null, i=0, n=c.steps.length, j;
    while(i<n){
      var st=i, en=n;
      for(j=i;j<n;j++){ if(c.steps[j].sep){ en=j; break; } }
      for(j=st;j<en;j++){ var s=c.steps[j]; if(s.info) continue; if(s.val){ if(s.carry && prev) s.val={n:prev.n,dim:prev.dim,u:prev.u}; break; } }
      var res=BT.fold(c.steps.slice(st,en)).acc;
      for(j=en-1;j>=st;j--){ if(c.steps[j].sub){ c.steps[j].text="= "+fv(res); break; } }
      prev=res; i=en+1;
    }
  }
  /* change the operation tied to a tapped line. tapping the first number changes the op that follows it. */
  function changeOp(i,op){
    if(!c.steps[i]||!c.steps[i].val||c.steps[i].info) return false;
    var st=0,j; for(j=i-1;j>=0;j--){ if(c.steps[j].sep){ st=j+1; break; } }
    var firstVal=-1; for(j=st;j<c.steps.length;j++){ var s=c.steps[j]; if(s.sep) break; if(s.val&&!s.info){ firstVal=j; break; } }
    var target=i;
    if(i===firstVal){ for(j=i+1;j<c.steps.length;j++){ var s2=c.steps[j]; if(s2.sep) break; if(s2.val&&!s2.info){ target=j; break; } } }
    if(target===firstVal) return false;                 /* nothing after the first number to re-operate */
    if(!c.steps[target]||!c.steps[target].val||c.steps[target].info) return false;
    c.steps[target].op=op; recomputeChain(); return true;
  }
  window.changeOp=changeOp; window.recomputeChain=recomputeChain;

  var orig=press;
  window.press=function(k){
    if(typeof editTarget!=="undefined" && editTarget!=null && (k==="add"||k==="sub"||k==="mul"||k==="div")
       && (typeof isPristineLoaded!=="function" || isPristineLoaded())
       && c.steps[editTarget] && c.steps[editTarget].val && !c.steps[editTarget].info){
      if(changeOp(editTarget, OPMAP[k])){ try{toast("Changed to "+(k==="mul"?"×":k==="div"?"÷":k==="sub"?"−":"+"));}catch(e){} render(); return; }
    }
    return orig(k);
  };
})();

    tabs.splice(i,1);
    if(tabs.length===0){ tabs.push(freshTab(1)); }
    loadTab(Math.min(i, tabs.length-1)===i && i<tabs.length ? i : Math.max(0, i-1));
    persist(); renderTabs(); render();
  }
  function renameTab(i){
    var n=prompt("Tab name:", tabs[i].name);
    if(n!=null && n.trim()!==""){ tabs[i].name=n.trim().slice(0,24); persist(); renderTabs(); }
  }
  function renderTabs(){
    if(!bar) return;
    bar.innerHTML="";
    tabs.forEach(function(t,i){
      var d=document.createElement("div"); d.className="tab"+(i===act?" on":"");
      var tx=document.createElement("span"); tx.className="tx"; tx.textContent=t.name; d.appendChild(tx);
      if(tabs.length>1){
        var x=document.createElement("span"); x.className="x"; x.textContent="✕";
        x.addEventListener("click",function(ev){ ev.stopPropagation(); closeTab(i); });
        d.appendChild(x);
      }
      d.addEventListener("click",function(){ switchTab(i); });
      d.addEventListener("dblclick",function(){ renameTab(i); });
      bar.appendChild(d);
    });
    var add=document.createElement("div"); add.className="addtab"; add.textContent="+"; add.title="New tape tab";
    add.addEventListener("click",addTab);
    bar.appendChild(add);
  }

  function boot(){
    desk();
    /* restore tabs; migrate the current single tape into Tab 1 on first run */
    try{
      var d=JSON.parse(localStorage.getItem("bt_tabs")||"null");
      if(d && d.tabs && d.tabs.length){ tabs=d.tabs; act=Math.min(d.act||0, tabs.length-1); }
    }catch(e){}
    if(tabs.length===0){ tabs=[{name:"Tape 1", steps:c.steps, roofD:roofD, stairD:stairD}]; act=0; }
    else { loadTab(act); }
    var app=document.getElementById("app"), tap=document.querySelector(".taparea");
    if(app && tap){ bar=document.createElement("div"); bar.id="tabbar"; app.insertBefore(bar, tap); }
    renderTabs();
    /* keep the active tab persisted on every save */
    var origSave=save;
    window.save=function(){ origSave(); commitActive(); persist(); };
    render();
  }
  if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded", boot);
})();
</script>
</body>
</html>
