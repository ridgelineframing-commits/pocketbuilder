<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1d21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PocketBuilder">
<title>PocketBuilder</title>
<meta name="description" content="PocketBuilder - builder tape calculator: feet-inch fractions, area, volume, roof and stair solver, board feet.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <header id="toolbar">
    <button class="brand" id="nameBtn" title="Settings">
      <svg viewBox="140 70 210 340" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
          <path d="M196 196 L214 300"/>
          <path d="M214 300 L206 356 L232 396 M232 396 L250 396"/>
          <path d="M214 300 L222 356 L196 396 M196 396 L178 396"/>
          <path d="M200 214 L170 252 L200 288"/>
          <path d="M206 214 L246 250 L330 250 L330 300"/>
        </g>
        <circle cx="196" cy="152" r="33" fill="none" stroke="currentColor" stroke-width="16"/>
        <path d="M150 124 a46 46 0 0 1 92 0 z" fill="#f5901f"/>
        <ellipse cx="196" cy="124" rx="56" ry="12" fill="#dc7413"/>
      </svg>
      Pocket<span>Builder</span></button>
    <div class="grp">
      <button class="tb" id="undoB" title="Undo (Ctrl+Z)">&#8630; Undo</button>
      <button class="tb" id="redoB" title="Redo (Ctrl+Y)">&#8631; Redo</button>
    </div>
    <span class="sp"></span>
    <div class="grp">
      <button class="tb" id="ksCopy" title="Copy tape">&#10697;</button>
      <button class="tb" data-fn="share">Share</button>
      <button class="tb" data-fn="save">Save</button>
      <button class="tb icon" id="menuBtn" title="Settings">&#9881;</button>
    </div>
  </header>

  <div id="tabbar"></div>

  <div class="main">
    <div class="taparea">
      <div class="tapewrap" id="tape"></div>
      <div class="toppanel" id="roofpop">
        <div class="tphdr">ROOF<span class="tphint">type a value, then tap a field</span><span class="tpx" id="roofPopClose">&#10005;</span></div>
        <div id="roofcells"></div>
        <div class="tpbtns"><button class="btn" id="roofToTape">&rarr; Tape</button></div>
      </div>
      <div class="toppanel" id="stairpop">
        <div class="tphdr">STAIRS<span class="tphint">type a value, then tap a field</span><span class="tpx" id="stairPopClose">&#10005;</span></div>
        <div id="staircells"></div>
        <div class="tpbtns"><button class="btn" id="stairToTape">&rarr; Tape</button></div>
      </div>
    </div>

    <aside id="keys">
      <div class="notestrip" id="noteBar">
        <button class="ns-lab" id="kbBtn">abc</button>
        <input id="noteInput" type="text" placeholder="tap abc to note this line&#8230;" autocomplete="off" autocorrect="off" autocapitalize="sentences">
        <button class="nbtn" id="noteDone">Done</button>
      </div>
      <div class="np">
        <button class="key fn" data-k="hipv">Roof</button><button class="key fn" data-k="stair">Stair</button><button class="key fn" data-k="circ">Circ</button><button class="key fn" data-k="conv">Conv</button>
        <button class="key unit" id="u0" data-k="feet">Feet</button><button class="key unit" id="u1" data-k="inch">Inch</button><button class="key unit" id="u2" data-k="frac">/</button><button class="key op small" data-k="bk" id="bkKey" title="Backspace &mdash; double-tap or hold to clear all">&#9003;</button>
        <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="div">&divide;</button>
        <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="mul">&times;</button>
        <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key op" data-k="sub" id="subKey" title="Minus &mdash; hold for &plusmn;">&minus;</button>
        <button class="key" data-k="0">0</button><button class="key" data-k="dot">.</button><button class="key eq" data-k="eq">=</button><button class="key op" data-k="add">+</button>
      </div>
    </aside>
  </div>


</div>

<div class="scrim" id="menu"><div class="sheet">
  <h4>PocketBuilder</h4>
  <div class="mrow"><div class="ml">Text size</div><div class="seg" id="sizeSeg"><button data-sz="s">Small</button><button data-sz="m">Medium</button><button data-sz="l">Large</button><button data-sz="x">XL</button></div></div>
  <div class="mrow"><div class="ml">Colors</div><div class="clrgrid" id="clrGrid">
    <label class="clr">Chrome<input type="color" data-c="chrome"></label>
    <label class="clr">Keys<input type="color" data-c="key"></label>
    <label class="clr">Op keys<input type="color" data-c="op"></label>
    <label class="clr">Ft/In<input type="color" data-c="unit"></label>
    <label class="clr">Solvers<input type="color" data-c="fn"></label>
    <label class="clr">Accent<input type="color" data-c="accent"></label>
    <label class="clr">Paper<input type="color" data-c="paper"></label>
    <label class="clr">Text<input type="color" data-c="ptxt"></label>
  </div></div>
  <div class="mrow"><div class="seg"><button id="woodBtn">Night Wood</button><button id="resetBtn">Reset colors</button></div></div>
  <div class="mrow"><div class="ml">Units</div><div class="seg" id="unitSeg"><button data-u="imp">Imperial</button><button data-u="met">Metric</button></div></div>
  <div class="mrow"><div class="ml">Fraction precision</div><div class="seg" id="fracSeg"><button data-fr="8">1/8</button><button data-fr="16">1/16</button><button data-fr="32">1/32</button></div></div>
  <div class="mrow"><div class="ml">Paper</div><div class="seg" id="paperSeg" style="gap:10px">
    <span class="swatch" data-pa="white" style="background:#ffffff"></span>
    <span class="swatch" data-pa="manila" style="background:#ecdcba"></span>
    <span class="swatch" data-pa="sky" style="background:#e3edfb"></span>
    <span class="swatch" data-pa="charcoal" style="background:#2b2e33"></span>
    <span class="swatch" data-pa="navy" style="background:#19233b"></span>
    <span class="swatch" data-pa="forest" style="background:#1b2a1d"></span>
    <span class="swatch" data-pa="coffee" style="background:#241c11"></span>
  </div></div>
  <div class="menubtns">
    <button class="btn alt" id="mNew">New tape</button>
    <button class="btn" id="mSave">Save .txt</button>
    <button class="btn alt" id="menuClose">Done</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
<script src="js/share.js"></script>
<script src="js/edit-ops.js"></script>
</body>
</html>
